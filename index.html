<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>AI 简历生成器</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif}
    body{background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);min-height:100vh;display:flex;justify-content:center;padding:20px}
    .container{width:100%;max-width:800px;display:flex;flex-direction:column;gap:20px}
    .header{text-align:center;padding:30px 0 10px}
    .header h1{color:#fff;font-size:28px;font-weight:700}
    .header p{color:#a0a0b8;font-size:14px;margin-top:6px}
    .header .emoji{font-size:40px;display:block;margin-bottom:8px}
    .card{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:24px;backdrop-filter:blur(10px)}
    .card-title{color:#e0e0e0;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .form-group{display:flex;flex-direction:column;gap:6px}
    .form-group.full{grid-column:1/-1}
    .form-group label{color:#b0b0c0;font-size:13px;font-weight:500}
    .form-group input,.form-group select,.form-group textarea{width:100%;padding:12px 14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#fff;font-size:14px;outline:none;transition:all 0.2s}
    .form-group textarea{min-height:100px;resize:vertical}
    .form-group input:focus,.form-group select:focus,.form-group textarea:focus{border-color:#4a9eff;background:rgba(255,255,255,0.1)}
    .form-group select option{background:#1a1a2e;color:#fff}
    .btn-primary{width:100%;padding:14px;background:linear-gradient(135deg, #4a9eff, #6c5ce7);border:none;border-radius:12px;color:#fff;font-size:16px;font-weight:600;cursor:pointer;transition:all 0.3s}
    .btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(74,158,255,0.3)}
    .btn-primary:disabled{opacity:0.5;cursor:not-allowed;transform:none}
    .btn-secondary{width:100%;padding:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#e0e0e0;font-size:14px;font-weight:500;cursor:pointer;transition:all 0.2s;margin-top:10px}
    .btn-secondary:hover{background:rgba(255,255,255,0.12)}
    .loading{display:none;text-align:center;padding:40px}
    .loading.active{display:block}
    .spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,0.1);border-top-color:#4a9eff;border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 12px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loading-text{color:#a0a0b8;font-size:14px}
    .result{display:none}
    .result.active{display:block}
    .resume-preview{background:#fff;color:#333;padding:40px;border-radius:8px;line-height:1.8;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    .resume-preview h1{font-size:24px;text-align:center;margin-bottom:4px;color:#1a1a2e}
    .resume-preview h2{font-size:16px;color:#4a9eff;border-bottom:2px solid #4a9eff;padding-bottom:4px;margin:16px 0 8px}
    .resume-preview h3{font-size:14px;color:#333;margin:8px 0 4px}
    .resume-preview ul{padding-left:20px;margin:4px 0}
    .resume-preview li{margin:2px 0}
    .tips{color:#888;font-size:12px;text-align:center;margin-top:8px}
    @media(max-width:600px){.form-grid{grid-template-columns:1fr}.header h1{font-size:22px}}
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <span class="emoji">📄</span>
    <h1>AI 简历生成器</h1>
    <p>输入信息 · AI 自动生成专业简历 · 支持下载 PDF</p>
  </div>

  <div class="card">
    <div class="card-title">👤 基本信息</div>
    <div class="form-grid">
      <div class="form-group"><label>姓名</label><input type="text" id="name" placeholder="如：张三" maxlength="20"></div>
      <div class="form-group"><label>求职意向</label><input type="text" id="jobTarget" placeholder="如：前端开发工程师" maxlength="50"></div>
      <div class="form-group"><label>手机（选填）</label><input type="text" id="phone" placeholder="如：138****1234" maxlength="15"></div>
      <div class="form-group"><label>邮箱</label><input type="email" id="email" placeholder="如：zhangsan@example.com" maxlength="80"></div>
      <div class="form-group"><label>学历</label><select id="education"><option value="">请选择</option><option value="博士">博士</option><option value="硕士">硕士</option><option value="本科">本科</option><option value="大专">大专</option><option value="高中">高中</option></select></div>
      <div class="form-group"><label>毕业院校</label><input type="text" id="school" placeholder="如：清华大学" maxlength="40"></div>
      <div class="form-group"><label>专业</label><input type="text" id="major" placeholder="如：计算机科学与技术" maxlength="40"></div>
      <div class="form-group"><label>毕业年份</label><input type="text" id="gradYear" placeholder="如：2025" maxlength="4"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💼 经历与技能</div>
    <div class="form-grid">
      <div class="form-group full"><label>工作/实习经历</label><textarea id="workExp" placeholder="如：&#10;2024.06-2024.09 字节跳动 前端实习生" maxlength="1000"></textarea></div>
      <div class="form-group full"><label>项目经历</label><textarea id="projects" placeholder="如：&#10;校园二手交易平台 独立开发" maxlength="1000"></textarea></div>
      <div class="form-group full"><label>技能特长（逗号分隔）</label><input type="text" id="skills" placeholder="如：Python, JavaScript, React" maxlength="300"></div>
      <div class="form-group full"><label>其他亮点（选填）</label><textarea id="highlights" placeholder="如：&#10;CET-6 580分" maxlength="500"></textarea></div>
    </div>
    <button class="btn-primary" id="genBtn" onclick="generateResume()">✨ 生成简历</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">AI 正在为你生成专业简历……</div></div>

  <div class="result" id="result">
    <div class="card" style="margin-bottom:0">
      <div class="card-title" style="justify-content:space-between"><span>📝 简历预览</span></div>
      <div class="resume-preview" id="resumeContent"></div>
      <button class="btn-secondary" onclick="downloadPDF()">📄 下载 PDF</button>
      <button class="btn-secondary" onclick="window.location.reload()">🔄 重新生成</button>
    </div>
  </div>

  <p class="tips">💡 AI 生成内容仅供参考，请根据实际情况修改。</p>
</div>

<script>
// 使用你的温柔陪伴 API 代理（无限制，免费）
const API_URL = 'https://51ai-1.pages.dev/api/proxy';

async function generateResume(){
  const name = document.getElementById('name').value.trim();
  const jobTarget = document.getElementById('jobTarget').value.trim();
  const email = document.getElementById('email').value.trim();
  const education = document.getElementById('education').value;
  const school = document.getElementById('school').value.trim();
  const major = document.getElementById('major').value.trim();

  if(!name || !jobTarget || !email){ alert('请填写姓名、求职意向和邮箱'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert('请输入有效的邮箱地址'); return; }
  if(!education || !school || !major){ alert('请填写完整的教育背景'); return; }

  const btn = document.getElementById('genBtn'), loading = document.getElementById('loading'), result = document.getElementById('result');
  btn.disabled = true; btn.textContent = '生成中……'; result.classList.remove('active'); loading.classList.add('active');

  try {
    const phone = document.getElementById('phone').value.trim();
    const gradYear = document.getElementById('gradYear').value.trim();
    const workExp = document.getElementById('workExp').value.trim();
    const projects = document.getElementById('projects').value.trim();
    const skills = document.getElementById('skills').value.trim();
    const highlights = document.getElementById('highlights').value.trim();

    if(gradYear && !/^\d{4}$/.test(gradYear)){ alert('毕业年份请输入4位数字'); loading.classList.remove('active'); btn.disabled = false; btn.textContent = '✨ 生成简历'; return; }
    if(phone && !/^\d{3,15}$/.test(phone.replace(/[\s\-()]/g,''))){ alert('手机号格式不正确'); loading.classList.remove('active'); btn.disabled = false; btn.textContent = '✨ 生成简历'; return; }

    const eduText = `${education} | ${school} | ${major} | ${gradYear}年毕业`;

    const systemPrompt = `你是资深HR和简历优化专家。请根据以下信息生成一份专业、简洁的HTML格式简历。
要求：使用HTML标签格式化，结构：头部(姓名+求职意向+联系方式) → 教育背景 → 工作经历 → 项目经历 → 技能 → 其他。每段经历用STAR法则重写，突出量化成果。技能部分用标签形式展示。整体风格专业简洁适合打印。不要写空洞形容词。如果某项内容为空直接跳过。输出完整HTML（从<div>开始），不要DOCTYPE和body标签。

教育背景：${eduText}
工作经历：${workExp || '无'}
项目经历：${projects || '无'}
技能：${skills || '无'}
其他亮点：${highlights || '无'}`;

    const userMessage = `请为${name}生成一份求职【${jobTarget}】的专业简历。联系方式：${phone || ''} | ${email}`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        temperature: 0.5,
        max_tokens: 2000,
        stream: true
      }),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || '服务器返回错误 ' + res.status);
    }

    // 流式接收
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = '';
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        const t = line.trim();
        if (!t || t === 'data: [DONE]') continue;
        if (!t.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(t.slice(6));
          const delta = d.choices?.[0]?.delta?.content;
          if (delta) fullContent += delta;
        } catch (e) {}
      }
    }

    if (!fullContent) throw new Error('AI返回内容为空，请重试');

    // XSS清洗
    const resumeDiv = document.getElementById('resumeContent');
    resumeDiv.innerHTML = '';
    const temp = document.createElement('div');
    temp.innerHTML = fullContent;
    temp.querySelectorAll('script').forEach(s => s.remove());
    temp.querySelectorAll('*').forEach(el => {
      Array.from(el.attributes).forEach(attr => {
        if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
      });
    });
    resumeDiv.innerHTML = temp.innerHTML;

    loading.classList.remove('active'); result.classList.add('active');
    result.scrollIntoView({ behavior:'smooth' });
  } catch(e){
    loading.classList.remove('active');
    if(e.name === 'AbortError'){
      alert('请求超时，AI接口响应较慢，请稍后再试');
    } else if(e.message.includes('服务器返回错误')) {
      alert('服务器错误，请稍后再试。如多次失败请截图联系开发者。');
    } else if(e.message.includes('AI返回内容为空')) {
      alert('AI未能生成简历，请尝试修改输入内容后重试。');
    } else {
      alert('生成失败，请检查网络后重试。如多次失败请截图联系开发者。');
    }
  }
  finally { btn.disabled = false; btn.textContent = '✨ 生成简历'; }
}

function downloadPDF(){
  const el = document.getElementById('resumeContent');
  html2pdf().set({ margin:[8,8,8,8], filename:'简历_'+(document.getElementById('name').value||'未命名')+'.pdf', image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'} }).from(el).save();
}
</script>
</body>
</html>
