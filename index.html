<head>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif}
    body{background:linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);min-height:100vh;display:flex;justify-content:center;padding:20px}
    .container{width:100%;max-width:800px;display:flex;flex-direction:column;gap:20px}
    .header{text-align:center;padding:30px 0 10px}

    .card-title{color:#e0e0e0;font-size:16px;font-weight:600;margin-bottom:16px;display:flex;align-items:center;gap:8px}

    @keyframes spin{to{transform:rotate(360deg)}}

    .result{display:none}
    .result.active{display:block}
    .resume-preview{background:#fff;color:#333;padding:40px;border-radius:8px;line-height:1.8;font-size:14px;box-shadow:0 10px 30px rgba(0,0,0,0.3)}
    .resume-preview h1{font-size:24px;text-align:center;margin-bottom:4px;color:#1a1a2e}

<body>
<div class="container">
  <div class="header">
    <span class="emoji">📄</span>

  </div>

  <div class="card">
    <div class="card-title">👤 基本信息</div>
    <div class="form-grid">
      <div class="form-group"><label>姓名</label><input type="text" id="name" placeholder="如：张三" maxlength="20"></div>
      <div class="form-group"><label>求职意向</label><input type="text" id="jobTarget" placeholder="如：前端开发工程师" maxlength="50"></div>

      <div class="form-group"><label>学历</label><select id="education"><option value="">请选择</option><option value="博士">博士</option><option value="硕士">硕士</option><option value="本科">本科</option><option value="大专">大专</option><option value="高中">高中</option></select></div>
      <div class="form-group"><label>毕业院校</label><input type="text" id="school" placeholder="如：清华大学" maxlength="40"></div>
      <div class="form-group"><label>专业</label><input type="text" id="major" placeholder="如：计算机科学与技术" maxlength="40"></div>
      <div class="form-group"><label>毕业年份</label><input type="text" id="gradYear" placeholder="如：2025" maxlength="4"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-title">💼 经历与技能</div>
    <div class="form-grid">
      <div class="form-group full"><label>工作/实习经历</label><textarea id="workExp" placeholder="如：&#10;2024.06-2024.09 字节跳动 前端实习生" maxlength="1000"></textarea></div>
      <div class="form-group full"><label>项目经历</label><textarea id="projects" placeholder="如：&#10;校园二手交易平台 独立开发" maxlength="1000"></textarea></div>
      <div class="form-group full"><label>技能特长（逗号分隔）</label><input type="text" id="skills" placeholder="如：Python, JavaScript, React" maxlength="300"></div>
      <div class="form-group full"><label>其他亮点（选填）</label><textarea id="highlights" placeholder="如：&#10;CET-6 580分" maxlength="500"></textarea></div>
    </div>
    <button class="btn-primary" id="genBtn" onclick="generateResume()">✨ 生成简历</button>
  </div>

  <div class="loading" id="loading"><div class="spinner"></div><div class="loading-text">AI 正在为你生成专业简历……</div></div>

  <div class="result" id="result">
    <div class="card" style="margin-bottom:0">
      <div class="card-title" style="justify-content:space-between"><span>📝 简历预览</span></div>

    </div>
  </div>

</div>

<script>
const API_URL = '/api/proxy';
const FREE_LIMIT = 3;
const STORAGE_KEY = 'resume_data_v2';

function getData(){
  const raw = localStorage.getItem(STORAGE_KEY);
  if(!raw) return { date: '', count: 0, paid: false, activationCode: '' };

  let d;
  try { d = JSON.parse(raw); } catch(e) { d = {}; }

  const storedHash = d._hash || '';
  const checkStr = (d.date||'') + (d.count||0) + (d.paid?'1':'0') + (d.activationCode||'');
  const computedHash = btoa(checkStr).slice(0,8);
  if(storedHash !== computedHash){
    d = { date: '', count: 0, paid: false, activationCode: '' };
  }

  const today = new Date().toLocaleDateString();
  if(d.date !== today) d = { date: today, count: 0, paid: d.paid || false, activationCode: d.activationCode || '' };

  return d;
}

function saveData(d){
  const checkStr = (d.date||'') + (d.count||0) + (d.paid?'1':'0') + (d.activationCode||'');
  d._hash = btoa(checkStr).slice(0,8);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
}

function updateBadge(){
  const d = getData();
  const b = document.getElementById('usageBadge');
  if(d.paid){ b.textContent = '💎 已付费 · 无限次'; b.style.color = '#2ecc71'; }
  else {
    const r = FREE_LIMIT - d.count;
    b.textContent = r > 0 ? `🆓 今日剩余：${r}次` : '🆓 今日次数已用完';
    if(r <= 0) b.style.color = '#e74c3c';
  }
}

function checkQuota(){ const d = getData(); return d.paid || d.count < FREE_LIMIT; }

function useQuota(){
  const d = getData();
  if(!d.paid){ d.count++; saveData(d); }
  updateBadge();
}

let pendingCode = '';
let verifyAttempts = 0;

async function activatePaid(code, answer){
  const c = (code || '').toUpperCase().trim();
  const a = (answer || '').trim();

  if(verifyAttempts >= 5){
    alert('验证尝试次数过多，请刷新页面后重试');
    return false;
  }

  try {
    const res = await fetch(API_URL, {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ type: 'activate', code: c, answer: a })
    });
    const data = await res.json();

    if(data.valid){
      verifyAttempts = 0;
      const used = JSON.parse(localStorage.getItem('used_codes') || '[]');
      if(used.includes(c)){ alert('此激活码已被使用'); return false; }
      used.push(c); localStorage.setItem('used_codes', JSON.stringify(used));
      const d = getData(); d.paid = true; d.activationCode = c; saveData(d); updateBadge();
      alert('激活成功！无限次使用已解锁');
      return true;
    }

    if(data.step === 2){
      pendingCode = data.code;
      showVerifyQuestion();
      return false;
    }

    verifyAttempts++;
    alert((data.message || '验证失败') + '（剩余尝试次数：' + (5-verifyAttempts) + '）');
    return false;
  } catch(e){
    alert('网络错误，请检查网络后重试');
    return false;
  }
}

function showVerifyQuestion(){
  const div = document.createElement('div');
  div.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,0.5);z-index:10002;display:flex;align-items:center;justify-content:center';
  div.innerHTML = `
    <div style="background:#1a1a2e;border:1px solid rgba(255,255,255,0.15);border-radius:20px;padding:24px;width:90%;max-width:360px;text-align:center;position:relative">
      <button style="position:absolute;top:10px;right:14px;background:none;border:none;font-size:20px;cursor:pointer;color:#fff" onclick="this.parentElement.parentElement.remove()">✕</button>
      <h3 style="color:#fff;margin-bottom:12px">验证问题</h3>
      <p style="color:#f39c12;font-size:16px;font-weight:600;margin:8px 0">开发者的AI陪伴产品叫什么名字？</p>
      <p style="color:#888;font-size:11px;margin-bottom:12px">提示：四个字</p>
      <input type="text" id="verifyAnswer" placeholder="输入答案" maxlength="20" style="width:100%;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:8px">
      <button class="btn-secondary" style="width:100%" onclick="handleVerifyAnswer(this)">确认</button>
      <button class="btn-secondary" style="width:100%;margin-top:4px" onclick="this.parentElement.parentElement.remove()">取消</button>
    </div>`;
  document.body.appendChild(div);
}

async function handleVerifyAnswer(btn){
  const answer = document.getElementById('verifyAnswer').value.trim();
  if(!answer){ alert('请输入答案'); return; }
  btn.disabled = true; btn.textContent = '验证中……';
  const result = await activatePaid(pendingCode, answer);
  if(result){
    document.querySelectorAll('[style*="z-index:10001"], [style*="z-index:10002"]').forEach(el => el.remove());
  } else {
    btn.disabled = false; btn.textContent = '确认';
  }
}

async function generateResume(){
  const name = document.getElementById('name').value.trim();
  const jobTarget = document.getElementById('jobTarget').value.trim();
  const email = document.getElementById('email').value.trim();
  const education = document.getElementById('education').value;
  const school = document.getElementById('school').value.trim();
  const major = document.getElementById('major').value.trim();

  if(!name || !jobTarget || !email){ alert('请填写姓名、求职意向和邮箱'); return; }
  if(!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)){ alert('请输入有效的邮箱地址'); return; }
  if(!education || !school || !major){ alert('请填写完整的教育背景'); return; }
  if(!checkQuota()){ alert('今日免费次数已用完，请付费升级'); showPayPage(); return; }

  const btn = document.getElementById('genBtn'), loading = document.getElementById('loading'), result = document.getElementById('result');
  btn.disabled = true; btn.textContent = '生成中……'; result.classList.remove('active'); loading.classList.add('active');

  try {
    const phone = document.getElementById('phone').value.trim();
    const gradYear = document.getElementById('gradYear').value.trim();
    const workExp = document.getElementById('workExp').value.trim();
    const projects = document.getElementById('projects').value.trim();
    const skills = document.getElementById('skills').value.trim();
    const highlights = document.getElementById('highlights').value.trim();

    if(gradYear && !/^\d{4}$/.test(gradYear)){ alert('毕业年份请输入4位数字'); loading.classList.remove('active'); btn.disabled = false; btn.textContent = '✨ 生成简历'; return; }
    if(phone && !/^\d{3,15}$/.test(phone.replace(/[\s\-()]/g,''))){ alert('手机号格式不正确'); loading.classList.remove('active'); btn.disabled = false; btn.textContent = '✨ 生成简历'; return; }

    const eduText = `${education} | ${school} | ${major} | ${gradYear}年毕业`;

    const systemPrompt = `你是资深HR和简历优化专家。请根据以下信息生成一份专业、简洁的HTML格式简历。
要求：使用HTML标签格式化，结构：头部(姓名+求职意向+联系方式) → 教育背景 → 工作经历 → 项目经历 → 技能 → 其他。每段经历用STAR法则重写，突出量化成果。技能部分用标签形式展示。整体风格专业简洁适合打印。不要写空洞形容词。如果某项内容为空直接跳过。输出完整HTML（从<div>开始），不要DOCTYPE和body标签。

教育背景：${eduText}
工作经历：${workExp || '无'}
项目经历：${projects || '无'}
技能：${skills || '无'}
其他亮点：${highlights || '无'}`;

    const userMessage = `请为${name}生成一份求职【${jobTarget}】的专业简历。联系方式：${phone || ''} | ${email}`;

    const controller = new AbortController();
    const timeout = setTimeout(() => controller.abort(), 30000);

    const res = await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'deepseek-v4-flash',
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user', content: userMessage }
        ],
        temperature: 0.5,
        max_tokens: 2000,
        stream: true
      }),
      signal: controller.signal
    });
    clearTimeout(timeout);

    if (!res.ok) {
      const errData = await res.json().catch(() => ({}));
      throw new Error(errData.error || '服务器返回错误 ' + res.status);
    }

    // 流式接收
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let fullContent = '';
    let buf = '';

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop() || '';
      for (const line of lines) {
        const t = line.trim();
        if (!t || t === 'data: [DONE]') continue;
        if (!t.startsWith('data: ')) continue;
        try {
          const d = JSON.parse(t.slice(6));
          const delta = d.choices?.[0]?.delta?.content;
          if (delta) fullContent += delta;
        } catch (e) {}
      }
    }

    if (!fullContent) throw new Error('AI返回内容为空，请重试');

    // XSS清洗
    const resumeDiv = document.getElementById('resumeContent');
    resumeDiv.innerHTML = '';
    const temp = document.createElement('div');
    temp.innerHTML = fullContent;
    temp.querySelectorAll('script').forEach(s => s.remove());
    temp.querySelectorAll('*').forEach(el => {
      Array.from(el.attributes).forEach(attr => {
        if (attr.name.startsWith('on')) el.removeAttribute(attr.name);
      });
    });
    resumeDiv.innerHTML = temp.innerHTML;

    useQuota(); loading.classList.remove('active'); result.classList.add('active');
    result.scrollIntoView({ behavior:'smooth' });
  } catch(e){
    loading.classList.remove('active');
    if(e.name === 'AbortError'){
      alert('请求超时，AI接口响应较慢，请稍后再试');
    } else if(e.message.includes('服务器返回错误')) {
      alert('服务器错误，请稍后再试。如多次失败请截图联系开发者。');
    } else if(e.message.includes('AI返回内容为空')) {
      alert('AI未能生成简历，请尝试修改输入内容后重试。');
    } else {
      alert('生成失败，请检查网络后重试。如多次失败请截图联系开发者。');
    }
  }
  finally { btn.disabled = false; btn.textContent = '✨ 生成简历'; }
}

function downloadPDF(){
  const el = document.getElementById('resumeContent');
  html2pdf().set({ margin:[8,8,8,8], filename:'简历_'+(document.getElementById('name').value||'未命名')+'.pdf', image:{type:'jpeg',quality:0.98}, html2canvas:{scale:2}, jsPDF:{unit:'mm',format:'a4',orientation:'portrait'} }).from(el).save();
}

        <div style="text-align:center"><p style="color:#aaa;font-size:11px">微信</p><img src="https://i.ibb.co/6KHXJx8/IMG-7069.jpg" style="width:130px;height:130px;object-fit:contain;background:#fff;border-radius:8px;padding:4px" alt="微信收款码"></div>

      <p style="color:#e74c3c;font-size:11px;margin:4px 0">虚拟商品一经售出概不退款</p>
      <p style="color:#fff;font-size:13px;margin:8px 0">付款后截屏发给 <span style="color:#2ecc71">wxid_xccoegiluvnr12</span> 获取激活码</p>
      <p style="color:#888;font-size:11px;margin:4px 0">超过24小时未收到码，请B站私信「温柔陪伴」</p>
      <p style="color:#a0a0b8;font-size:12px;margin:8px 0">已有激活码？</p>
      <input type="text" id="activateCode" placeholder="输入激活码" maxlength="20" style="width:100%;padding:10px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#fff;font-size:14px;text-align:center;outline:none;margin-bottom:8px">
      <button class="btn-secondary" style="width:100%" onclick="activatePaid(document.getElementById('activateCode').value,'')">激活</button>
      <button class="btn-secondary" style="width:100%;margin-top:4px" onclick="exportActivation()">导出激活</button>
      <button class="btn-secondary" style="width:100%;margin-top:4px" onclick="importActivation()">导入激活</button>
      <button class="btn-secondary" style="width:100%;margin-top:4px" onclick="this.parentElement.parentElement.remove()">关闭</button>

function exportActivation(){
  const d = getData();
  if(!d.paid){ alert('你还没有激活付费权限'); return; }
  const exportData = { paid: true, time: Date.now(), sign: btoa('valid_' + Date.now()).slice(0,12) };
  const blob = new Blob([JSON.stringify(exportData)], {type:'application/json'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
  a.download = '简历生成器_激活备份.json'; a.click();
  alert('备份文件有效期10分钟，请尽快导入新设备。');
}

function importActivation(){
  const input = document.createElement('input'); input.type = 'file'; input.accept = '.json';
  input.onchange = e => {
    const f = e.target.files[0], r = new FileReader();
    r.onload = ev => {
      try {
        const data = JSON.parse(ev.target.result);
        if(!data.time || Date.now()-data.time > 600000){ alert('备份文件已过期（超10分钟），请重新导出'); return; }
        if(data.paid && data.sign && data.sign.startsWith('dmFsaWRf')){
          const d = getData(); d.paid = true; saveData(d); updateBadge();
          alert('已导入！');
        } else { alert('文件格式不对'); }
      } catch(e){ alert('文件格式不对'); }
    };
    r.readAsText(f);
  };
  input.click();
}

updateBadge();
</script>
</body>
